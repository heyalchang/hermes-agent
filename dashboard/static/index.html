<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar .status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block; margin-left: 8px;
}
.topbar .status-dot.on { background: var(--green); }
.topbar .status-dot.off { background: var(--red); }

/* ── Tab bar ── */
.tabs {
  display: flex;
  gap: 0;
  padding: 0 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tabs button {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  font-family: var(--font);
}
.tabs button:hover { color: var(--text); }
.tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── Main content ── */
.content { padding: 24px; max-width: 1400px; margin: 0 auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Cards ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
.card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* ── Tables ── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th, td {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
th {
  color: var(--text-dim);
  font-weight: 500;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;
  background: var(--bg-card);
}
tr:hover { background: var(--bg-hover); }
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: auto;
  max-height: 600px;
}

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.badge-user { background: #1f6feb33; color: var(--accent); }
.badge-assistant { background: #3fb95033; color: var(--green); }
.badge-tool { background: #d2992233; color: var(--orange); }
.badge-system { background: #bc8cff33; color: var(--purple); }
.badge-cli { background: #8b949e33; color: var(--text-dim); }
.badge-telegram { background: #1f6feb33; color: #58a6ff; }
.badge-discord { background: #5865f233; color: #8b9cff; }
.badge-whatsapp { background: #3fb95033; color: #3fb950; }
.badge-slack { background: #d2992233; color: #d29922; }
.badge-signal { background: #3a76f033; color: #6b9fff; }
.badge-homeassistant { background: #41bdf533; color: #41bdf5; }
.badge-email { background: #bc8cff33; color: #bc8cff; }
.badge-webhook { background: #f0883e33; color: #f0883e; }
.badge-matrix { background: #03b38133; color: #03b381; }
.badge-mattermost { background: #1473a833; color: #1473a8; }
.badge-dingtalk { background: #1677ff33; color: #1677ff; }
.badge-sms { background: #3fb95033; color: #7ee787; }
.badge-web { background: #f0883e33; color: #f0883e; }
.badge-acp { background: #e85aad33; color: #e85aad; }
.badge-cron { background: #7ee78733; color: #7ee787; }
.badge-entrypoint { background: #bc8cff33; color: #bc8cff; }
.badge-project { background: #d2992233; color: #d29922; }

/* ── Transcript ── */
.transcript {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 16px;
}
.msg {
  padding: 10px 14px;
  border-radius: var(--radius);
  max-width: 85%;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user { background: var(--accent-dim); align-self: flex-end; }
.msg.assistant { background: var(--bg-hover); border: 1px solid var(--border); }
.msg.tool { background: #1a1e2a; border: 1px solid #30363d; font-family: var(--mono); font-size: 12px; }
.msg.system { background: #2a1f3a; border: 1px solid #483860; font-size: 12px; }
.msg .msg-role { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }

/* ── Split layout (sessions) ── */
.split { display: flex; gap: 16px; min-height: 600px; }
.split-list { width: 360px; flex-shrink: 0; }
.split-detail { flex: 1; min-width: 0; }
.session-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 13px;
}
.session-item:hover { background: var(--bg-hover); }
.session-item.selected { background: var(--accent-dim); border-left: 3px solid var(--accent); }
.session-item .si-id { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
.session-item .si-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; }

/* ── Log viewer ── */
.log-viewer {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  max-height: 700px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
}

/* ── Search ── */
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.search-bar input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar button, .toolbar button, .btn {
  padding: 8px 16px;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
}
.search-bar button:hover, .toolbar button:hover, .btn:hover {
  background: var(--accent);
}

/* ── Memory viewer ── */
.memory-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 900px) { .memory-grid { grid-template-columns: 1fr; } }
.memory-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow: auto;
}
.memory-section { margin-bottom: 0; }
.memory-section h3 {
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar select {
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
}
.toolbar label {
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Collapsible ── */
.collapsible {
  cursor: pointer;
  user-select: none;
}
.collapsible::before {
  content: '\25B6';
  display: inline-block;
  margin-right: 6px;
  font-size: 10px;
  transition: transform 0.2s;
}
.collapsible.open::before { transform: rotate(90deg); }
.collapsible-body { display: none; padding: 8px 0 8px 20px; }
.collapsible.open + .collapsible-body { display: block; }

/* ── Insights ── */
.insights-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 900px) { .insights-grid { grid-template-columns: 1fr; } }
.insights-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.insights-section h4 {
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.insights-section table { font-size: 12px; }
.insights-section th { font-size: 11px; background: transparent; }
.bar-cell {
  background: var(--accent-dim);
  height: 16px;
  border-radius: 3px;
  min-width: 2px;
}

/* ── Cron calendar ── */
/* (cron stats inlined into calendar legend bar) */

.cron-warnings {
  margin-bottom: 20px;
}
.cron-warning {
  background: #d2992215;
  border: 1px solid #d2992244;
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cron-warning.error { background: #f8514915; border-color: #f8514944; }
.cron-warning .warn-icon { font-size: 14px; flex-shrink: 0; }

/* ── Cron split layout ── */
.cron-split {
  display: flex;
  gap: 16px;
}
.cron-split-list {
  width: 320px;
  flex-shrink: 0;
  overflow-y: auto;
  height: 480px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.cron-split-detail {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  height: 480px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
@media (max-width: 900px) {
  .cron-split { flex-direction: column; }
  .cron-split-list { width: 100%; max-height: 400px; }
}

/* ── Calendar (hour×day grid like alphaclaw) ── */
.cron-calendar-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 20px;
}
.cron-calendar-wrap .cal-legend {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  gap: 16px;
  align-items: center;
}
.cron-calendar-wrap .cal-legend .cal-swatch {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 3px;
  margin-right: 4px;
  vertical-align: middle;
}

.cal-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  table-layout: fixed;
}
.cal-table th {
  font-weight: 400;
  color: var(--text-dim);
  padding: 3px 2px;
  text-align: center;
  font-size: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
}
.cal-table th.today { color: var(--accent); background: rgba(88,166,255,0.06); }
.cal-table th.hour-col { text-align: right; width: 36px; padding-right: 6px; }
.cal-table td {
  padding: 1px 2px;
  vertical-align: middle;
  border: 1px solid var(--border);
  height: 22px;
}
.cal-table td.hour-label {
  text-align: right;
  padding-right: 6px;
  color: var(--text-dim);
  font-size: 10px;
  vertical-align: middle;
  white-space: nowrap;
  background: var(--bg-card);
  width: 36px;
}
.cal-table td.today { background: rgba(88,166,255,0.03); }
.cal-table tr.hour-row-now { background: rgba(88,166,255,0.05); }

/* Gap indicator between non-contiguous hours */
.cal-table tr.cal-gap td {
  height: 3px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-top: none;
  border-bottom: none;
  background: var(--bg);
}
.cal-table tr.cal-gap td.hour-label {
  background: var(--bg);
  border: none;
}

.cal-block {
  display: block;
  padding: 2px 5px;
  margin-bottom: 1px;
  border-radius: 3px;
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  color: #fff;
  line-height: 1.4;
  position: relative;
}
.cal-block:hover { filter: brightness(1.2); }
.cal-block.future { background: #30363d; border: 1px dashed #484f58; color: var(--text-dim); }
.cal-block.ok { background: #238636; }
.cal-block.error { background: #da3633; }
.cal-block.unknown { background: #6e7681; }
.cal-block.missed { background: #b08800; }

/* Token intensity colors */
.cal-block.tier-low { opacity: 0.65; }
.cal-block.tier-medium { opacity: 0.8; }
.cal-block.tier-high { opacity: 0.95; }
.cal-block.tier-very-high { box-shadow: 0 0 6px rgba(255,255,255,0.2); }

/* ── Cron job rows (compact, tarmac-style) ── */
.cron-group-header {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 10px 12px 4px;
  border-bottom: 1px solid var(--border);
}
.cron-group-header:not(:first-child) {
  border-top: 1px solid var(--border);
}
.cron-job-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.cron-job-row:hover { background: var(--bg-hover); }
.cron-job-row.selected { background: rgba(88,166,255,0.08); border-left: 2px solid var(--accent); padding-left: 10px; }

.health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.health-dot.ok { background: var(--green); box-shadow: 0 0 4px var(--green); }
.health-dot.error { background: var(--red); box-shadow: 0 0 4px var(--red); }
.health-dot.never { background: #6e7681; }
.health-dot.paused { background: var(--orange); }

.cron-job-info {
  flex: 1;
  min-width: 0;
}
.cron-job-name {
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cron-job-meta {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.cron-job-badge {
  font-size: 10px;
  color: var(--text-dim);
  background: rgba(255,255,255,0.04);
  padding: 1px 6px;
  border-radius: 3px;
  white-space: nowrap;
  font-family: var(--mono);
  flex-shrink: 0;
}

.model-badge {
  background: #bc8cff22;
  color: var(--purple);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  white-space: nowrap;
}

/* ── Cron detail pane ── */
.cron-detail-empty {
  color: var(--text-dim);
  font-style: italic;
  padding: 40px;
  text-align: center;
}
.cron-detail-label {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 12px;
  word-break: break-all;
}
.cron-detail-section { margin-bottom: 14px; }
.cron-detail-row {
  display: flex;
  gap: 12px;
  font-size: 12px;
  line-height: 1.7;
}
.cron-detail-row .k {
  color: var(--text-dim);
  min-width: 72px;
  flex-shrink: 0;
}
.cron-detail-row .v { word-break: break-all; }

/* ── Cron controls (placeholder for future run-now/pause/enable) ── */
.cron-controls {
  display: flex;
  gap: 8px;
  margin: 12px 0;
}
.cron-controls button {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
}
.cron-controls button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.cron-controls button:disabled { opacity: 0.4; cursor: default; }
.cron-controls .feedback {
  font-size: 11px;
  color: var(--text-dim);
  align-self: center;
}

/* ── Cron tabbed viewer (prompt / output / history) ── */
.cron-viewer { margin-top: 12px; }
.cron-viewer-bar {
  display: flex;
  align-items: baseline;
  gap: 0;
}
.cron-viewer-tab {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-bottom: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 3px 3px 0 0;
}
.cron-viewer-tab.active { background: var(--bg); color: var(--text); }
.cron-viewer-path {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 50%;
  padding: 0 4px 2px;
}
.cron-viewer-content {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.4;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 0 4px 4px 4px;
  padding: 8px;
  max-height: 220px;
  overflow: auto;
  white-space: pre-wrap;
  color: var(--text);
}

/* ── Run history within viewer ── */
.cron-run-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.cron-run-entry:last-child { border-bottom: none; }
.cron-run-entry .run-status { width: 50px; }
.cron-run-entry .run-time { color: var(--text-dim); width: 140px; }
.cron-run-entry .run-tokens { font-family: var(--mono); width: 70px; }
.cron-run-entry .run-model { color: var(--text-dim); }
.cron-run-entry .run-link { font-size: 11px; }

/* ── Loading ── */
.loading { color: var(--text-dim); padding: 40px; text-align: center; }
.empty { color: var(--text-dim); padding: 40px; text-align: center; font-style: italic; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .split { flex-direction: column; }
  .split-list { width: 100%; }
  .cards { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Hermes Dashboard</h1>
  <span id="gateway-status"></span>
</div>

<div class="tabs" id="tab-bar">
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="messages">Messages</button>
  <button data-tab="sessions">Sessions</button>
  <button data-tab="usage">Usage</button>
  <button data-tab="cron">Cron Jobs</button>
  <button data-tab="logs">Logs</button>
  <button data-tab="search">Search</button>
  <button data-tab="memory">Memory</button>
  <button data-tab="plugins">Plugins</button>
  <button data-tab="checkpoints">Checkpoints</button>
</div>

<div class="content">

  <!-- ═══ Overview ═══ -->
  <div class="tab-panel active" id="panel-overview">
    <div class="cards" id="overview-cards"></div>
    <h3 style="margin-bottom:12px; font-size:15px;">Recent Sessions</h3>
    <div class="table-wrap">
      <table id="overview-sessions">
        <thead><tr><th>Session</th><th>Title</th><th>Source</th><th>Model</th><th>Messages</th><th>Tokens</th><th>Cost</th><th>Started</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- ═══ Messages ═══ -->
  <div class="tab-panel" id="panel-messages">
    <div class="toolbar">
      <select id="feed-source">
        <option value="">All platforms</option>
        <option value="telegram">Telegram</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="discord">Discord</option>

<script>
// ═══════════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

async function api(path) {
  const r = await fetch('/api/' + path);
  return r.json();
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleString();
}

function fmtIsoTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString(); } catch { return iso; }
}

function fmtIsoTimeShort(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString(); } catch { return (iso || '').slice(11, 19); }
}

function fmtRelTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const future = diffMs < 0;
    const absDiff = Math.abs(diffMs);
    const mins = Math.floor(absDiff / 60000);
    const hrs = Math.floor(absDiff / 3600000);
    const days = Math.floor(absDiff / 86400000);
    let rel;
    if (mins < 1) rel = 'just now';
    else if (mins < 60) rel = `${mins}m ${future ? 'from now' : 'ago'}`;
    else if (hrs < 24) rel = `${hrs}h ${future ? 'from now' : 'ago'}`;
    else if (days < 7) rel = `${days}d ${future ? 'from now' : 'ago'}`;
    else return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    return `<span title="${d.toLocaleString()}">${rel}</span>`;
  } catch { return iso; }
}

function fmtNum(n) {
  if (n == null) return '0';
  return Number(n).toLocaleString();
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function sourceBadge(source) {
  const cls = 'badge badge-' + (source || 'cli');
  return `<span class="${cls}">${esc(source || 'unknown')}</span>`;
}

function roleBadge(role) {
  const cls = 'badge badge-' + (role || 'system');
  return `<span class="${cls}">${esc(role)}</span>`;
}

function esc(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function escAttr(s) {
  return esc(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function truncate(s, len) {
  if (!s) return '';
  return s.length > len ? s.slice(0, len) + '...' : s;
}

function shortModel(m) {
  if (!m) return '—';
  // Strip provider prefix (e.g. "anthropic/claude-sonnet-4.6" → "claude-sonnet-4.6")
  if (m.includes('/')) m = m.split('/').pop();
  // Strip date suffix (e.g. "claude-sonnet-4-20250514" → "claude-sonnet-4")
  m = m.replace(/-\d{8}$/, '');
  return m;
}

// ═══════════════════════════════════════════════════════════════════
// Tab switching
// ═══════════════════════════════════════════════════════════════════
const tabHandlers = {
  overview: loadOverview,
  messages: loadFeed,
  sessions: loadSessions,
  usage: loadUsage,
  cron: loadCron,
  logs: loadLogs,
  search: () => {},
  memory: loadMemory,
  plugins: loadPlugins,
  checkpoints: loadCheckpoints,
};

let activeTab = 'overview';

function stopAllIntervals() {
  if (logInterval) { clearInterval(logInterval); logInterval = null; }
  if (feedInterval) { clearInterval(feedInterval); feedInterval = null; }
  if (cronCountdownTimer) { clearInterval(cronCountdownTimer); cronCountdownTimer = null; }
  // Uncheck the auto-refresh boxes when leaving their tabs
  $('#logs-auto-refresh').checked = false;
  $('#feed-auto-refresh').checked = false;
}

$$('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    stopAllIntervals();
    $$('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $$('.tab-panel').forEach(p => p.classList.remove('active'));
    $(`#panel-${btn.dataset.tab}`).classList.add('active');
    activeTab = btn.dataset.tab;
    location.hash = btn.dataset.tab;
    tabHandlers[btn.dataset.tab]();
  });
});

// Hash restore happens at end of script (after all tab handlers are defined)

// ═══════════════════════════════════════════════════════════════════
// Overview
// ═══════════════════════════════════════════════════════════════════
async function loadOverview() {
  const [status, sessions] = await Promise.all([
    api('status'),
    api('sessions?limit=10'),
  ]);

  // Gateway status
  const dot = status.running
    ? '<span class="status-dot on"></span> Running'
    : '<span class="status-dot off"></span> Stopped';
  $('#gateway-status').innerHTML = dot;

  // Detect billing mode from recent sessions
  const recentBilling = sessions.reduce((acc, s) => {
    const mode = s.billing_mode || s.cost_status || 'unknown';
    if (mode === 'subscription_included' || mode === 'included') acc.included++;
    else if (s.billing_provider) acc.billed++;
    else acc.unknown++;
    return acc;
  }, { included: 0, billed: 0, unknown: 0 });
  const authLabel = recentBilling.included > recentBilling.billed ? 'Subscription' : recentBilling.billed > 0 ? 'API Key' : 'Unknown';
  const authSub = recentBilling.included > 0 && recentBilling.billed > 0
    ? `${recentBilling.included} incl / ${recentBilling.billed} billed`
    : '';

  // Services summary
  const svc = status.services || {};
  const gw = svc.gateway || {};
  const svcLines = [];
  const svcDot = (on) => `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--${on ? 'green' : 'red'});margin-right:6px"></span>`;
  svcLines.push(`${svcDot(gw.running)}Gateway${gw.platforms?.length ? ' <span style="color:var(--text-dim);font-size:11px">(' + esc(gw.platforms.join(', ')) + ')</span>' : ''}`);
  svcLines.push(`${svcDot(svc.dashboard?.running)}Dashboard`);
  svcLines.push(`${svcDot(svc.whatsapp_bridge?.running)}WhatsApp Bridge`);
  const svcUp = [gw.running, svc.dashboard?.running, svc.whatsapp_bridge?.running].filter(Boolean).length;
  const svcTotal = 3;

  // Cards
  $('#overview-cards').innerHTML = `
    <div class="card">
      <div class="label">Services</div>
      <div class="value" style="font-size:20px">${svcUp}/${svcTotal} up</div>
      <div class="sub" style="margin-top:6px;line-height:1.8">${svcLines.join('<br>')}</div>
    </div>
    <div class="card">
      <div class="label">Sessions</div>
      <div class="value">${fmtNum(status.session_count)}</div>
    </div>
    <div class="card">
      <div class="label">Messages</div>
      <div class="value">${fmtNum(status.message_count)}</div>
    </div>
    <div class="card">
      <div class="label">Auth</div>
      <div class="value" style="font-size:20px">${authLabel}</div>
      ${authSub ? `<div class="sub">${authSub}</div>` : ''}
    </div>
  `;

  // Recent sessions
  const tbody = $('#overview-sessions tbody');
  tbody.innerHTML = sessions.map(s => {
    const cost = s.estimated_cost_usd;
    const isIncl = (s.billing_mode || '') === 'subscription_included' || (s.cost_status || '') === 'included';
    const costTd = cost != null && cost > 0
      ? isIncl
        ? `<span style="opacity:0.5">$${Number(cost).toFixed(2)}</span> <span style="font-size:9px;opacity:0.5">incl</span>`
        : `<span style="color:var(--green)">$${Number(cost).toFixed(2)}</span>`
      : '<span style="color:var(--text-dim)">—</span>';
    return `
    <tr>
      <td><span style="font-family:var(--mono);font-size:12px">${esc(s.id?.slice(0, 20))}</span></td>
      <td>${s.title ? esc(truncate(s.title, 20)) : '<span style="color:var(--text-dim)">—</span>'}</td>
      <td>${sourceBadge(s.source)}</td>
      <td>${esc(shortModel(s.model))}</td>
      <td>${fmtNum(s.message_count)}</td>
      <td>${fmtTokens((s.input_tokens||0) + (s.output_tokens||0))}</td>
      <td>${costTd}</td>
      <td>${fmtTime(s.started_at)}</td>
    </tr>
    `;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// Sessions
// ═══════════════════════════════════════════════════════════════════
let currentSessionId = null;

$('#sessions-source-filter').addEventListener('change', loadSessions);

async function loadSessions() {
  const source = $('#sessions-source-filter').value;
  const params = source ? `?source=${source}&limit=100` : '?limit=100';
  const sessions = await api('sessions' + params);

  const list = $('#sessions-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty">No sessions found</div>';
    return;
  }

  list.innerHTML = sessions.map(s => {
    const selected = s.id === currentSessionId ? ' selected' : '';
    const tokens = (s.input_tokens || 0) + (s.output_tokens || 0);
    const titleHtml = s.title ? `<div style="font-weight:600;font-size:13px;margin-bottom:2px">${esc(s.title)}</div>` : '';
    const chainHtml = s.end_reason === 'compression' ? '<span style="color:var(--orange);font-size:11px" title="Continued in child session">⛓ compressed</span>' :
      s.parent_session_id ? '<span style="color:var(--orange);font-size:11px" title="Continued from parent session">⛓ continued</span>' : '';
    const voiceHtml = s.has_voice ? '<span style="color:#58a6ff;font-size:11px" title="Voice session">🎙 voice</span>' : '';
    // Cache efficiency
    const cacheRead = s.cache_read_tokens || 0;
    const cacheWrite = s.cache_write_tokens || 0;
    const totalIn = (s.input_tokens || 0) + cacheRead + cacheWrite;
    const cacheHtml = totalIn > 0 && cacheRead > 0
      ? `<span style="color:var(--text-dim);font-size:11px" title="Read: ${fmtTokens(cacheRead)} / Write: ${fmtTokens(cacheWrite)}">${(cacheRead / totalIn * 100).toFixed(0)}% 💾</span>`
      : '';
    return `
      <div class="session-item${selected}" data-id="${esc(s.id)}">
        ${titleHtml}
        <div class="si-id">${esc(s.id?.slice(0, 24))}</div>
        <div class="si-meta">
          ${sourceBadge(s.source)}
          <span style="color:var(--text-dim);font-size:12px">${fmtNum(s.message_count)} msgs</span>
          <span style="color:var(--text-dim);font-size:12px">${fmtTokens(tokens)} tok</span>
          ${cacheHtml}
          ${chainHtml}
          ${voiceHtml}
        </div>
        <div style="color:var(--text-dim);font-size:11px;margin-top:2px">${fmtTime(s.started_at)}</div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.session-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.session-item').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      loadSessionDetail(el.dataset.id);
    });
  });
}

async function loadSessionDetail(sessionId) {
  currentSessionId = sessionId;
  const detail = $('#session-detail');
  detail.innerHTML = '<div class="loading">Loading...</div>';

  const messages = await api(`sessions/${sessionId}/messages`);

  if (!messages.length) {
    detail.innerHTML = '<div class="empty">No messages in this session</div>';
    return;
  }

  let html = '<div class="transcript">';
  for (const m of messages) {
    const role = m.role || 'unknown';
    let content = m.content || '';

    // For tool calls, show a summary
    if (m.tool_calls) {
      const calls = Array.isArray(m.tool_calls) ? m.tool_calls : [];
      const callSummary = calls.map(c => {
        const fn = c.function?.name || c.name || 'unknown';
        return fn;
      }).join(', ');
      if (callSummary) {
        content += (content ? '\n' : '') + '[Tool calls: ' + callSummary + ']';
      }
    }

    if (m.tool_name) {
      content = `[${m.tool_name}]\n${content}`;
    }

    html += `
      <div class="msg ${role}">
        <div class="msg-role">${roleBadge(role)} <span style="color:var(--text-dim);font-size:11px;margin-left:8px">${fmtTime(m.timestamp)}</span></div>
        ${esc(truncate(content, 2000))}
      </div>
    `;
  }
  html += '</div>';
  detail.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// Usage
// ═══════════════════════════════════════════════════════════════════
function fmtCost(n) {
  if (!n) return '$0.00';
  return '$' + Number(n).toFixed(2);
}

function fmtDuration(seconds) {
  if (!seconds) return '—';
  if (seconds < 60) return Math.round(seconds) + 's';
  const m = seconds / 60;
  if (m < 60) return Math.round(m) + 'm';
  const h = m / 60;
  const rm = Math.round(m % 60);
  return Math.floor(h) + 'h' + (rm ? ' ' + rm + 'm' : '');
}

async function loadUsage() {
  const days = $('#usage-days').value;
  const source = $('#usage-source').value;
  const params = `?days=${days}` + (source ? `&source=${source}` : '');
  const [usage, insights] = await Promise.all([
    api('tokens' + params),
    api('insights' + params),
  ]);
  const s = usage.summary || {};
  const o = insights.overview || {};

  // Cards — augmented with insights data
  const activeHtml = o.total_hours
    ? `<div class="card"><div class="label">Active Time</div><div class="value" style="font-size:22px">~${fmtDuration(o.total_hours * 3600)}</div><div class="sub">avg ${fmtDuration(o.avg_session_duration)}/session</div></div>`
    : '';

  // Billing summary line
    const billingLine = s.included_sessions > 0 && s.api_billed_sessions > 0
      ? `${fmtNum(s.included_sessions)} incl / ${fmtNum(s.api_billed_sessions)} billed`
      : s.included_sessions > 0 ? `${fmtNum(s.included_sessions)} sessions (subscription)`
      : s.api_billed_sessions > 0 ? `${fmtNum(s.api_billed_sessions)} sessions (API-billed)`
      : `${fmtNum(s.total_sessions)} sessions`;

    // Cost card — show total with billing breakdown
    const totalCost = s.total_estimated_cost_usd || 0;
    const apiCost = s.api_billed_cost_usd || 0;
    const inclCost = s.included_cost_usd || 0;
    const costCardSub = apiCost > 0 && inclCost > 0
      ? `<span style="color:var(--green)">${fmtCost(apiCost)} billed</span> · <span style="opacity:0.6">${fmtCost(inclCost)} incl</span>`
      : apiCost > 0 ? `<span style="color:var(--green)">API-billed</span>`
      : inclCost > 0 ? `<span style="opacity:0.6">subscription included</span>`
      : '';

    // Cache — summary exposes both uncached and true-total input.
    const totalIn = s.total_true_input_tokens ?? s.total_input_tokens ?? 0;
    const uncachedIn = s.total_uncached_input_tokens ?? s.total_input_tokens ?? 0;
    const cacheTotal = totalIn;
    const cacheHitPct = cacheTotal > 0 ? ((s.total_cache_read_tokens || 0) / cacheTotal * 100).toFixed(1) : '0.0';

  $('#usage-cards').innerHTML = `
    <div class="card">
      <div class="label">Sessions</div>
      <div class="value">${fmtNum(s.total_sessions)}</div>
      <div class="sub">${billingLine}</div>
    </div>
    <div class="card">
      <div class="label">Total Tokens</div>
      <div class="value">${fmtTokens(s.total_tokens)}</div>
      <div class="sub">In: ${fmtTokens(totalIn)} / Out: ${fmtTokens(s.total_output_tokens)}${s.total_reasoning_tokens ? ' / Reason: ' + fmtTokens(s.total_reasoning_tokens) : ''}</div>
    </div>
    <div class="card">
      <div class="label">Cache</div>
      <div class="value">${cacheHitPct}% hit</div>
      <div class="sub">Uncached: ${fmtTokens(uncachedIn)} / Read: ${fmtTokens(s.total_cache_read_tokens || 0)} / Write: ${fmtTokens(s.total_cache_write_tokens || 0)}</div>
    </div>
    <div class="card">
      <div class="label">Est. Cost</div>
      <div class="value">${fmtCost(totalCost)}</div>
      <div class="sub">${costCardSub || '—'}</div>
    </div>
    ${activeHtml}
  `;

  // Insights panels
  const panels = $('#insights-panels');
  if (insights.empty) {
    panels.innerHTML = '';
  } else {
    let html = '<div class="insights-grid">';

    // Models breakdown
    if (insights.models?.length) {
      html += '<div class="insights-section"><h4>Models</h4><table><thead><tr><th>Model</th><th>Sessions</th><th>Tokens</th><th>Cost</th></tr></thead><tbody>';
      for (const m of insights.models) {
        html += `<tr><td>${esc(shortModel(m.model))}</td><td>${fmtNum(m.sessions)}</td><td>${fmtTokens(m.total_tokens)}</td><td>${m.has_pricing ? fmtCost(m.cost) : 'N/A'}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }

    // Platform breakdown
    if (insights.platforms?.length > 1 || (insights.platforms?.length === 1 && insights.platforms[0].platform !== 'cli')) {
      html += '<div class="insights-section"><h4>Platforms</h4><table><thead><tr><th>Platform</th><th>Sessions</th><th>Messages</th><th>Tokens</th></tr></thead><tbody>';
      for (const p of insights.platforms) {
        html += `<tr><td>${sourceBadge(p.platform)}</td><td>${fmtNum(p.sessions)}</td><td>${fmtNum(p.messages)}</td><td>${fmtTokens(p.total_tokens)}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }

    // Tool usage (top 15)
    if (insights.tools?.length) {
      html += '<div class="insights-section"><h4>Top Tools</h4><table><thead><tr><th>Tool</th><th>Calls</th><th>%</th></tr></thead><tbody>';
      const maxCount = insights.tools[0]?.count || 1;
      for (const t of insights.tools.slice(0, 15)) {
        const barW = Math.max(2, Math.round(t.count / maxCount * 60));
        html += `<tr><td>${esc(t.tool)}</td><td>${fmtNum(t.count)}<div class="bar-cell" style="width:${barW}px;margin-top:2px"></div></td><td>${t.percentage.toFixed(1)}%</td></tr>`;
      }
      html += '</tbody></table></div>';
    }

    // Activity patterns
    const act = insights.activity || {};
    if (act.by_day?.length) {
      const maxDay = Math.max(...act.by_day.map(d => d.count)) || 1;
      html += '<div class="insights-section"><h4>Activity</h4>';
      html += '<div style="display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:12px">';
      for (const d of act.by_day) {
        const h = Math.max(4, Math.round(d.count / maxDay * 70));
        html += `<div style="flex:1;text-align:center"><div class="bar-cell" style="width:100%;height:${h}px"></div><div style="font-size:10px;color:var(--text-dim);margin-top:4px">${d.day}</div></div>`;
      }
      html += '</div>';
      if (act.busiest_hour) {
        const hr = act.busiest_hour.hour;
        const ampm = hr < 12 ? 'AM' : 'PM';
        const dhr = hr % 12 || 12;
        html += `<div style="font-size:12px;color:var(--text-dim)">Peak hour: ${dhr}${ampm} (${act.busiest_hour.count} sessions)</div>`;
      }
      if (act.active_days) html += `<div style="font-size:12px;color:var(--text-dim)">Active days: ${act.active_days}</div>`;
      if (act.max_streak > 1) html += `<div style="font-size:12px;color:var(--text-dim)">Best streak: ${act.max_streak} consecutive days</div>`;
      html += '</div>';
    }

    // Notable sessions
    if (insights.top_sessions?.length) {
      html += '<div class="insights-section"><h4>Notable Sessions</h4><table><thead><tr><th>Metric</th><th>Value</th><th>Date</th></tr></thead><tbody>';
      for (const ts of insights.top_sessions) {
        html += `<tr><td>${esc(ts.label)}</td><td>${esc(ts.value)}</td><td>${esc(ts.date)}</td></tr>`;
      }
      html += '</tbody></table></div>';
    }

    html += '</div>';
    panels.innerHTML = html;
  }
}

// ═══════════════════════════════════════════════════════════════════
// Cron
// ═══════════════════════════════════════════════════════════════════

// -- Cron calendar helpers (ported from alphaclaw) --
const kMinuteMs = 60000, kHourMs = 3600000, kDayMs = 86400000;
const kRollingPast = 3, kRollingFuture = 3;

function startOfDayMs(ms) { const d = new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }
function startOfHourMs(ms) { const d = new Date(ms); d.setMinutes(0,0,0); return d.getTime(); }
function toDayKey(ms) { const d = new Date(ms); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function parseCronFields(schedule) {
  const expr = String(schedule?.expr || schedule?.cron || '').trim();
  const f = expr.split(/\s+/);
  if (f.length < 5) return null;
  return { minuteField: f[0], hourField: f[1], dayOfMonthField: f[2], monthField: f[3], dayOfWeekField: f[4] };
}

function parseToken(token, min, max) {
  if (/^\d+$/.test(token)) { const v = parseInt(token); return v >= min && v <= max ? [v] : []; }
  const rm = token.match(/^(\d+)-(\d+)$/);
  if (rm) { const s = Math.max(min, +rm[1]), e = Math.min(max, +rm[2]); return s > e ? [] : Array.from({length: e-s+1}, (_,i) => s+i); }
  const sm = token.match(/^\*\/(\d+)$/);
  if (sm) { const step = +sm[1]; if (step <= 0) return []; const v = []; for (let i = min; i <= max; i += step) v.push(i); return v; }
  if (token === '*') return Array.from({length: max-min+1}, (_,i) => min+i);
  return [];
}

function parseCronFieldSet(field, min, max) {
  return new Set(String(field||'').trim().split(',').map(s=>s.trim()).filter(Boolean).flatMap(t => parseToken(t, min, max)));
}

function buildCronMatcher(cf) {
  if (!cf) return null;
  return {
    minuteSet: parseCronFieldSet(cf.minuteField, 0, 59),
    hourSet: parseCronFieldSet(cf.hourField, 0, 23),
    domSet: parseCronFieldSet(cf.dayOfMonthField, 1, 31),
    monthSet: parseCronFieldSet(cf.monthField, 1, 12),
    dowSet: parseCronFieldSet(cf.dayOfWeekField, 0, 7),
  };
}

function cronFieldMatches(date, m) {
  if (!m) return false;
  const dow = date.getDay();
  const dowAliases = dow === 0 ? [0,7] : [dow];
  return (m.minuteSet.size === 0 || m.minuteSet.has(date.getMinutes()))
    && (m.hourSet.size === 0 || m.hourSet.has(date.getHours()))
    && (m.domSet.size === 0 || m.domSet.has(date.getDate()))
    && (m.monthSet.size === 0 || m.monthSet.has(date.getMonth()+1))
    && (m.dowSet.size === 0 || dowAliases.some(d => m.dowSet.has(d)));
}

function isHighFrequencyCron(job) {
  if (String(job?.schedule?.kind||'').toLowerCase() !== 'cron') return false;
  const cf = parseCronFields(job.schedule);
  if (!cf || cf.dayOfMonthField !== '*' || cf.monthField !== '*') return false;
  const mSet = parseCronFieldSet(cf.minuteField, 0, 59);
  const hSet = parseCronFieldSet(cf.hourField, 0, 23);
  const activeH = hSet.size > 0 ? hSet.size : 24;
  const runsPerH = mSet.size > 0 ? mSet.size : 1;
  const stepM = String(cf.minuteField||'').match(/^\*\/(\d+)$/);
  if (stepM) return +stepM[1] <= 30 && activeH >= 4;
  return runsPerH >= 3 && activeH >= 4;
}

function expandJobsToRollingSlots(jobs, nowMs) {
  nowMs = nowMs || Date.now();
  const rangeStart = startOfDayMs(nowMs - kRollingPast * kDayMs);
  const rangeEnd = startOfDayMs(nowMs + kRollingFuture * kDayMs) + kDayMs - 1;
  const dayCount = kRollingPast + kRollingFuture + 1;

  const days = Array.from({length: dayCount}, (_, i) => {
    const ds = startOfDayMs(rangeStart + i * kDayMs);
    return { dayStartMs: ds, dayKey: toDayKey(ds), label: new Date(ds).toLocaleDateString([], {weekday:'short', month:'numeric', day:'numeric'}) };
  });

  const slots = [];
  for (const job of jobs) {
    const kind = String(job?.schedule?.kind || '').toLowerCase();
    // Handle interval jobs (hermes uses kind:"interval" with minutes)
    if (kind === 'interval' || kind === 'every') continue;
    if (isHighFrequencyCron(job)) continue;

    if (kind === 'once' || kind === 'at') {
      const runAt = job?.schedule?.run_at || job?.schedule?.at;
      if (!runAt) continue;
      let atMs;
      if (typeof runAt === 'number') { atMs = runAt; }
      else { try { atMs = new Date(runAt).getTime(); } catch(e) { continue; } }
      if (isNaN(atMs) || atMs < rangeStart || atMs > rangeEnd) continue;
      slots.push({ key: `${job.id}:${atMs}`, jobId: job.id, jobName: job.name || job.id, scheduledAtMs: atMs, dayKey: toDayKey(atMs), hourOfDay: new Date(atMs).getHours() });
      continue;
    }

    const cf = parseCronFields(job?.schedule);
    if (!cf) continue;
    const matcher = buildCronMatcher(cf);
    if (!matcher) continue;
    for (let tick = rangeStart; tick <= rangeEnd; tick += kMinuteMs) {
      const d = new Date(tick);
      if (!cronFieldMatches(d, matcher)) continue;
      slots.push({ key: `${job.id}:${tick}`, jobId: job.id, jobName: job.name || job.id, scheduledAtMs: tick, dayKey: toDayKey(tick), hourOfDay: d.getHours() });
    }
  }

  slots.sort((a, b) => a.scheduledAtMs - b.scheduledAtMs);
  return { days, slots, rangeStartMs: rangeStart, rangeEndMs: rangeEnd };
}

function mapRunStatusesToSlots(slots, runsByJobId, nowMs) {
  nowMs = nowMs || Date.now();
  const toleranceMs = 45 * kMinuteMs;
  const statusByKey = {};
  const tokensByKey = {};
  const consumed = {};

  for (const slot of slots) {
    if (slot.scheduledAtMs > nowMs) continue;
    const entries = runsByJobId[slot.jobId]?.entries || [];
    if (!entries.length) continue;
    if (!consumed[slot.jobId]) consumed[slot.jobId] = new Set();

    let best = null, bestDelta = Infinity;
    for (const e of entries) {
      if (consumed[slot.jobId].has(e.ts)) continue;
      const delta = Math.abs(e.ts - slot.scheduledAtMs);
      if (delta > toleranceMs) continue;
      if (delta < bestDelta) { bestDelta = delta; best = e; }
    }
    if (best) {
      consumed[slot.jobId].add(best.ts);
      statusByKey[slot.key] = best.status || 'unknown';
      if (best.totalTokens) tokensByKey[slot.key] = best.totalTokens;
    }
  }
  return { statusByKey, tokensByKey };
}

function buildTokenTiers(jobs, runsByJobId) {
  const avgs = {};
  for (const job of jobs) {
    const entries = runsByJobId[job.id]?.entries || [];
    if (!entries.length) continue;
    const total = entries.reduce((s, e) => s + (e.totalTokens || 0), 0);
    avgs[job.id] = Math.round(total / entries.length);
  }
  const vals = Object.values(avgs).filter(v => v > 0).sort((a,b) => a-b);
  if (!vals.length) return {};
  const pAt = r => vals[Math.min(vals.length-1, Math.floor((vals.length-1)*r))];
  const q1 = pAt(0.25), q2 = pAt(0.5), p90 = pAt(0.9);
  const tiers = {};
  for (const [id, avg] of Object.entries(avgs)) {
    if (avg <= 0) tiers[id] = 'unknown';
    else if (avg <= q1) tiers[id] = 'low';
    else if (avg <= q2) tiers[id] = 'medium';
    else if (avg <= p90) tiers[id] = 'high';
    else tiers[id] = 'very-high';
  }
  return tiers;
}

// -- Cron optimization warnings --
function getCronWarnings(jobs) {
  const warnings = [];
  const now = Date.now();
  for (const j of jobs) {
    if (j.last_status === 'error') {
      warnings.push({ type: 'error', msg: `<strong>${esc(j.name)}</strong> last run failed` });
    }
    if (j.state === 'paused') {
      warnings.push({ type: 'warn', msg: `<strong>${esc(j.name)}</strong> is paused` });
    }
    if (j.enabled !== false && j.state !== 'paused' && j.next_run_at) {
      try {
        const nra = new Date(j.next_run_at).getTime();
        if (nra < now - 3600000) {
          warnings.push({ type: 'warn', msg: `<strong>${esc(j.name)}</strong> next_run_at is in the past (stale schedule?)` });
        }
      } catch(e) {}
    }
    if (j.deliver === 'origin' && !j.origin) {
      warnings.push({ type: 'warn', msg: `<strong>${esc(j.name)}</strong> delivers to origin but no origin is set` });
    }
  }
  return warnings;
}

// -- Human-readable schedule --
function humanSchedule(schedule) {
  if (!schedule) return '—';
  const kind = String(schedule.kind || '').toLowerCase();
  if (kind === 'once') {
    const d = schedule.run_at ? new Date(schedule.run_at) : null;
    return d ? `Once: ${d.toLocaleDateString([], {month:'short', day:'numeric'})} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}` : 'Once';
  }
  if (kind === 'interval') {
    const m = schedule.minutes || 0;
    if (m >= 1440) return `Every ${Math.round(m/1440)}d`;
    if (m >= 60) return `Every ${Math.round(m/60)}h`;
    return `Every ${m}m`;
  }
  if (kind === 'cron' && schedule.expr) {
    return cronToHuman(schedule.expr);
  }
  return schedule.display || '—';
}

// Format hour+minute into "9:00 AM" style
function _fmtCronTime(hr, min) {
  const h = parseInt(hr, 10);
  const m = parseInt(min, 10);
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  const mm = String(m).padStart(2, '0');
  return `${h12}:${mm} ${ampm}`;
}

// Ordinal suffix: 1 → "1st", 2 → "2nd", 3 → "3rd", 4 → "4th", ...
function _ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function cronToHuman(expr) {
  if (!expr) return expr;
  const p = expr.trim().split(/\s+/);
  if (p.length < 5) return expr;
  const [min, hr, dom, mon, dow] = p;

  const dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowNamesFull = ['Sundays','Mondays','Tuesdays','Wednesdays','Thursdays','Fridays','Saturdays'];
  const monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Determine time label
  let timeLabel = null;
  const hrFixed = hr !== '*' && !/[\/,\-]/.test(hr);
  const minFixed = min !== '*' && !/[\/,\-]/.test(min);

  // Step patterns: */N in hr or min with all-wildcard elsewhere
  if (dom === '*' && mon === '*' && dow === '*') {
    const hrStep = hr.match(/^\*\/(\d+)$/);
    const minStep = min.match(/^\*\/(\d+)$/);
    if (hrStep && min === '0') return `Every ${hrStep[1]}h`;
    if (hrStep) return `Every ${hrStep[1]}h`;
    if (minStep && hr === '*') return `Every ${minStep[1]}m`;
  }

  if (hrFixed && minFixed) {
    timeLabel = _fmtCronTime(hr, min);
  } else if (hrFixed && min === '0') {
    timeLabel = _fmtCronTime(hr, '0');
  } else if (hrFixed) {
    timeLabel = `${hr}:xx`;
  } else if (minFixed) {
    timeLabel = `*:${String(parseInt(min,10)).padStart(2,'0')}`;
  }

  const atTime = timeLabel ? ` at ${timeLabel}` : '';

  // Day-of-week patterns (dom and mon both wildcard)
  if (dom === '*' && mon === '*' && dow !== '*') {
    // Check for step
    const dowStep = dow.match(/^\*\/(\d+)$/);
    if (dowStep) return `Every ${dowStep[1]} days${atTime}`;

    const days = [...parseCronFieldSet(dow, 0, 7)].map(d => d % 7).filter((d,i,a) => a.indexOf(d) === i).sort((a,b)=>a-b);

    // Weekdays shortcut: 1-5
    if (days.length === 5 && days[0] === 1 && days[4] === 5) return `Weekdays${atTime}`;
    // Weekend: 0,6
    if (days.length === 2 && days[0] === 0 && days[1] === 6) return `Weekends${atTime}`;

    // Check if it's a single day
    if (days.length === 1) return `${dowNamesFull[days[0]]}${atTime}`;

    // Multiple days: abbreviate
    const names = days.map(d => dowNames[d]);
    return `${names.join(', ')}${atTime}`;
  }

  // Day-of-month patterns (dow and mon both wildcard)
  if (dow === '*' && mon === '*' && dom !== '*') {
    const domStep = dom.match(/^\*\/(\d+)$/);
    if (domStep) return `Every ${domStep[1]} days${atTime}`;

    const domDays = dom.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)).sort((a,b)=>a-b);
    if (domDays.length === 1) return `${_ordinal(domDays[0])} of each month${atTime}`;
    return `${domDays.map(_ordinal).join(', ')} of each month${atTime}`;
  }

  // Specific month (dom and dow both wildcard)
  if (dow === '*' && dom !== '*' && mon !== '*') {
    const mIdx = parseInt(mon, 10) - 1;
    const mName = monNames[mIdx] || mon;
    const domDays = dom.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)).sort((a,b)=>a-b);
    const dayPart = domDays.length === 1 ? _ordinal(domDays[0]) : domDays.map(_ordinal).join(', ');
    return `${mName} ${dayPart}${atTime}`;
  }

  // All wildcards on dom/mon/dow → daily
  if (dom === '*' && mon === '*' && dow === '*') {
    return `Daily${atTime}`;
  }

  // Fallback: produce something readable
  const parts = [];
  if (dow !== '*') {
    const days = [...parseCronFieldSet(dow, 0, 7)].map(d => d % 7).filter((d,i,a) => a.indexOf(d) === i).sort((a,b)=>a-b);
    parts.push(days.map(d => dowNames[d]).join(', '));
  }
  if (dom !== '*') parts.push(`day ${dom}`);
  if (mon !== '*') {
    const mIdx = parseInt(mon, 10) - 1;
    parts.push(monNames[mIdx] || `month ${mon}`);
  }
  if (timeLabel) parts.push(`at ${timeLabel}`);
  return parts.join(' ') || expr;
}

// Compact cadence word for the job list badge
function cronToCompact(schedule) {
  if (!schedule) return '—';
  const kind = String(schedule.kind || '').toLowerCase();

  if (kind === 'once') return 'once';

  if (kind === 'interval') {
    const m = schedule.minutes || 0;
    if (m >= 1440) return `every ${Math.round(m/1440)}d`;
    if (m >= 60) return `every ${Math.round(m/60)}h`;
    return `every ${m}m`;
  }

  if (kind === 'cron' && schedule.expr) {
    const expr = schedule.expr.trim();
    const p = expr.split(/\s+/);
    if (p.length < 5) return 'custom';
    const [min, hr, dom, mon, dow] = p;

    // Step patterns
    const hrStep = hr.match(/^\*\/(\d+)$/);
    const minStep = min.match(/^\*\/(\d+)$/);
    if (hrStep && dom === '*' && mon === '*' && dow === '*') return `every ${hrStep[1]}h`;
    if (minStep && hr === '*' && dom === '*' && mon === '*' && dow === '*') return `every ${minStep[1]}m`;

    // dow-based
    if (dom === '*' && mon === '*' && dow !== '*') {
      const days = [...parseCronFieldSet(dow, 0, 7)].map(d => d % 7).filter((d,i,a) => a.indexOf(d) === i).sort((a,b)=>a-b);
      if (days.length === 5 && days[0] === 1 && days[4] === 5) return 'weekdays';
      if (days.length === 2 && days[0] === 0 && days[1] === 6) return 'weekends';
      if (days.length === 1) return 'weekly';
      return `${days.length}×/week`;
    }

    // dom-based
    if (dow === '*' && mon === '*' && dom !== '*') {
      const domDays = dom.split(',').map(s => s.trim()).filter(Boolean);
      if (domDays.length === 1) return 'monthly';
      return `${domDays.length}×/month`;
    }

    // yearly
    if (dow === '*' && dom !== '*' && mon !== '*' && !mon.includes(',') && !mon.includes('/')) return 'yearly';

    // daily
    if (dom === '*' && mon === '*' && dow === '*') return 'daily';

    return 'custom';
  }

  return '—';
}

// -- Countdown formatting --
function fmtCountdown(isoDate) {
  if (!isoDate) return '';
  try {
    const ms = new Date(isoDate).getTime() - Date.now();
    if (ms < 0) return 'overdue';
    const mins = Math.floor(ms / 60000);
    const hrs = Math.floor(ms / 3600000);
    const days = Math.floor(ms / 86400000);
    if (hrs < 1) return `${mins}m from now`;
    if (days < 1) return `${hrs}h from now`;
    if (days === 1) return '1 day from now';
    return `${days} days from now`;
  } catch(e) { return ''; }
}

let cronCountdownTimer = null;
let _selectedCronJobId = null;
let _cronOutputsCache = {};

// Store runs data globally for detail panel access
let _cronRunsByJobId = {};

async function loadCron() {
  if (cronCountdownTimer) { clearInterval(cronCountdownTimer); cronCountdownTimer = null; }

  const [jobs, cronStatus, runsData] = await Promise.all([
    api('cron'),
    api('cron/status'),
    api('cron/runs?days=7'),
  ]);

  _cronRunsByJobId = runsData.runs_by_job_id || {};

  // -- Stats (inline in legend bar) --
  const nextWake = cronStatus.nextWakeAtMs ? fmtRelTime(new Date(cronStatus.nextWakeAtMs).toISOString()) : '—';
  const statsInline = $('#cron-stats-inline');
  if (statsInline) {
    statsInline.innerHTML = `<span style="color:var(--green)">${cronStatus.enabled || 0}</span>/${cronStatus.total || 0} enabled · Next: <span style="color:var(--text)">${nextWake}</span>`;
  }

  // -- Warnings --
  const warnings = getCronWarnings(jobs);
  const warningsEl = $('#cron-warnings');
  if (warnings.length) {
    warningsEl.innerHTML = '<div class="cron-warnings">' + warnings.map(w =>
      `<div class="cron-warning ${w.type === 'error' ? 'error' : ''}"><span class="warn-icon">${w.type === 'error' ? '●' : '▲'}</span>${w.msg}</div>`
    ).join('') + '</div>';
  } else {
    warningsEl.innerHTML = '';
  }

  // -- Calendar (hour×day grid like alphaclaw) --
  const calJobs = jobs.filter(j => j.enabled !== false && j.state !== 'paused');
  const nowMs = Date.now();
  const { days, slots } = expandJobsToRollingSlots(calJobs, nowMs);
  const { statusByKey, tokensByKey } = mapRunStatusesToSlots(slots, _cronRunsByJobId, nowMs);
  const tiers = buildTokenTiers(calJobs, _cronRunsByJobId);

  const calWrap = $('#cron-calendar-wrap');
  const calTableWrap = $('#cron-cal-table-wrap');

  if (slots.length > 0) {
    calWrap.style.display = '';
    const todayKey = toDayKey(nowMs);
    const nowHour = new Date(nowMs).getHours();

    // Collect unique hours that have slots
    // Sparse rendering: active hours + 1 context + current hour
    const activeHours = new Set(slots.map(s => s.hourOfDay));
    activeHours.add(nowHour);
    const withContext = new Set(activeHours);
    for (const h of activeHours) {
      if (h > 0) withContext.add(h - 1);
      if (h < 23) withContext.add(h + 1);
    }
    const hoursToShow = [...withContext].sort((a,b) => a - b);

    // Build hour×day table
    let html = '<table class="cal-table"><thead><tr>';
    html += '<th class="hour-col"></th>';
    for (const day of days) {
      html += `<th class="${day.dayKey === todayKey ? 'today' : ''}">${day.label}</th>`;
    }
    html += '</tr></thead><tbody>';

    let prevHour = -2;
    for (const hour of hoursToShow) {
      // Gap indicator for non-contiguous hours
      if (prevHour >= 0 && hour > prevHour + 1) {
        html += '<tr class="cal-gap"><td class="hour-label">⋮</td>';
        for (const day of days) html += '<td></td>';
        html += '</tr>';
      }
      prevHour = hour;

      const isNowRow = todayKey === toDayKey(nowMs) && hour === nowHour;
      const hourLabel = hour === 0 ? '12a' : hour < 12 ? `${hour}a` : hour === 12 ? '12p' : `${hour-12}p`;

      html += `<tr class="${isNowRow ? 'hour-row-now' : ''}">`;
      html += `<td class="hour-label">${hourLabel}</td>`;

      for (const day of days) {
        const cellSlots = slots.filter(s => s.dayKey === day.dayKey && s.hourOfDay === hour);
        const todayCls = day.dayKey === todayKey ? ' today' : '';
        html += `<td class="${todayCls}">`;
        if (cellSlots.length === 0) {
          html += '&nbsp;';
        } else {
          for (const slot of cellSlots) {
            const isFuture = slot.scheduledAtMs > nowMs;
            let cls = 'cal-block';
            const job = calJobs.find(j => j.id === slot.jobId);
            const jobName = job?.name || slot.jobName || slot.jobId;

            // Build tooltip
            let tipLines = [jobName];
            const runEntries = _cronRunsByJobId[slot.jobId]?.entries || [];
            if (runEntries.length) {
              const totalTok = runEntries.reduce((s,e) => s + (e.totalTokens||0), 0);
              const avgTok = Math.round(totalTok / runEntries.length);
              tipLines.push(`Avg tokens/run: ${fmtTokens(avgTok)}`);
              tipLines.push(`Runs (7d): ${runEntries.length}`);
              const latest = runEntries[0];
              if (latest) {
                tipLines.push(`Latest run: ${latest.status} (${new Date(latest.ts).toLocaleString()})`);
              }
            }
            const slotTime = new Date(slot.scheduledAtMs).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
            tipLines.push(`Slot: ${isFuture ? 'upcoming' : 'past'} (${slotTime})`);

            if (isFuture) {
              cls += ' future';
            } else {
              const status = statusByKey[slot.key] || 'missed';
              cls += ` ${status}`;
              const tier = tiers[slot.jobId];
              if (tier) cls += ` tier-${tier}`;
            }

            html += `<div class="${cls}" title="${esc(tipLines.join('\n'))}" data-cal-job-id="${esc(slot.jobId)}">${esc(truncate(jobName, 22))}</div>`;
          }
        }
        html += '</td>';
      }
      html += '</tr>';
    }

    html += '</tbody></table>';
    calTableWrap.innerHTML = html;
  } else {
    calWrap.style.display = 'none';
  }

  // -- Job list (left pane, compact rows grouped by state) --
  const jobListEl = $('#cron-job-list');
  if (!jobs.length) {
    jobListEl.innerHTML = '<div class="cron-detail-empty">No cron jobs</div>';
    return;
  }

  // Group: active, paused, disabled
  const activeJobs = jobs.filter(j => j.enabled !== false && j.state !== 'paused')
    .sort((a, b) => {
      const aMs = a.next_run_at ? new Date(a.next_run_at).getTime() : Infinity;
      const bMs = b.next_run_at ? new Date(b.next_run_at).getTime() : Infinity;
      return aMs - bMs;
    });
  const pausedJobs = jobs.filter(j => j.state === 'paused');
  const disabledJobs = jobs.filter(j => j.enabled === false && j.state !== 'paused');

  const groups = [
    { title: 'Active', jobs: activeJobs },
    { title: 'Paused', jobs: pausedJobs },
    { title: 'Disabled', jobs: disabledJobs },
  ];

  let html = '';
  for (const g of groups) {
    if (g.jobs.length === 0) continue;
    html += `<div class="cron-group-header">${g.title} (${g.jobs.length})</div>`;
    for (const j of g.jobs) {
      let healthCls = 'never';
      if (j.state === 'paused') healthCls = 'paused';
      else if (j.last_status === 'ok') healthCls = 'ok';
      else if (j.last_status === 'error') healthCls = 'error';

      const schedLabel = humanSchedule(j.schedule);
      const sel = j.id === _selectedCronJobId ? ' selected' : '';

      const deliverShort = j.deliver ? ` → ${j.deliver}` : '';

      html += `<div class="cron-job-row${sel}" data-job-id="${esc(j.id)}">` +
        `<div class="health-dot ${healthCls}" title="Last: ${j.last_status || 'never run'}"></div>` +
        `<div class="cron-job-info">` +
          `<div class="cron-job-name">${esc(j.name)}</div>` +
          `<div class="cron-job-meta">${esc(schedLabel)}${esc(deliverShort)}</div>` +
        `</div>` +
        `</div>`;
    }
  }
  jobListEl.innerHTML = html;

  // Auto-select first job into right pane if none selected
  if (!_selectedCronJobId && activeJobs.length > 0) {
    selectCronJob(activeJobs[0].id);
  } else if (_selectedCronJobId) {
    selectCronJob(_selectedCronJobId);
  }
}

async function selectCronJob(jobId) {
  _selectedCronJobId = jobId;
  const detail = $('#cron-detail');

  // Highlight the selected row
  document.querySelectorAll('.cron-job-row').forEach(r => r.classList.remove('selected'));
  const row = document.querySelector(`.cron-job-row[data-job-id="${CSS.escape(jobId)}"]`);
  if (row) row.classList.add('selected');

  const [jobs, outputs] = await Promise.all([
    api('cron'),
    api(`cron/${jobId}/outputs`),
  ]);
  _cronOutputsCache = { jobId, files: outputs };

  const job = jobs.find(j => j.id === jobId);
  if (!job) {
    detail.innerHTML = '<div class="cron-detail-empty">Job not found</div>';
    return;
  }

  // -- Header --
  let healthCls = 'never';
  if (job.state === 'paused') healthCls = 'paused';
  else if (job.last_status === 'ok') healthCls = 'ok';
  else if (job.last_status === 'error') healthCls = 'error';

  // -- K/V detail rows --
  let rows = '';
  const statusColor = job.last_status === 'ok' ? 'var(--green)' : job.last_status === 'error' ? 'var(--red)' : 'var(--text-dim)';
  rows += `<div class="cron-detail-row"><span class="k">State</span><span class="v"><span class="health-dot ${healthCls}" style="display:inline-block;vertical-align:middle;margin-right:4px"></span>${job.state || (job.enabled === false ? 'disabled' : 'active')}</span></div>`;
  if (job.schedule) {
    const schedHuman = humanSchedule(job.schedule);
    const schedRaw = job.schedule.kind === 'cron' && job.schedule.expr
      ? ` <span style="color:var(--text-dim);font-size:0.85em">(${esc(job.schedule.expr)})</span>`
      : ` <span style="color:var(--text-dim);font-size:0.85em">(${esc(job.schedule.kind)})</span>`;
    rows += `<div class="cron-detail-row"><span class="k">Schedule</span><span class="v">${esc(schedHuman)}${schedRaw}</span></div>`;
  }
  if (job.last_run_at) rows += `<div class="cron-detail-row"><span class="k">Last run</span><span class="v">${fmtRelTime(job.last_run_at)} — <span style="color:${statusColor}">${job.last_status || '—'}</span></span></div>`;
  else rows += `<div class="cron-detail-row"><span class="k">Last run</span><span class="v" style="color:var(--text-dim)">never run</span></div>`;
  if (job.last_error) rows += `<div class="cron-detail-row"><span class="k">Error</span><span class="v" style="color:var(--red)">${esc(job.last_error)}</span></div>`;
  if (job.next_run_at) {
    const d = new Date(job.next_run_at);
    const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ', ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    rows += `<div class="cron-detail-row"><span class="k">Next run</span><span class="v">${dateStr} (${fmtCountdown(job.next_run_at)})</span></div>`;
  }
  if (job.deliver) {
    const origin = job.origin ? ` (${esc(job.origin.platform)}${job.origin.chat_name ? ': ' + esc(job.origin.chat_name) : ''})` : '';
    rows += `<div class="cron-detail-row"><span class="k">Deliver</span><span class="v">${esc(job.deliver)}${origin}</span></div>`;
  }
  if (job.model) rows += `<div class="cron-detail-row"><span class="k">Model</span><span class="v">${esc(job.model)}</span></div>`;

  // -- Build tabs: prompt, output (if files exist), history (if runs exist) --
  const runEntries = (_cronRunsByJobId[jobId]?.entries || []).slice(0, 10);
  const hasOutputs = outputs.length > 0;
  const hasHistory = runEntries.length > 0;

  let tabsHtml = '<button class="cron-viewer-tab active" data-cron-tab="prompt">prompt</button>';
  if (hasOutputs) tabsHtml += '<button class="cron-viewer-tab" data-cron-tab="output">output</button>';
  if (hasHistory) tabsHtml += `<button class="cron-viewer-tab" data-cron-tab="history">history (${runEntries.length})</button>`;

  detail.innerHTML = `
    <div class="cron-detail-label">${esc(job.name)}</div>
    <div class="cron-detail-section">${rows}</div>
    <div class="cron-controls">
      <button disabled title="Coming soon">Run Now</button>
      <button disabled title="Coming soon">${job.state === 'paused' ? 'Resume' : 'Pause'}</button>
      <button disabled title="Coming soon">${job.enabled === false ? 'Enable' : 'Disable'}</button>
      <span class="feedback"></span>
    </div>
    <div class="cron-viewer">
      <div class="cron-viewer-bar">
        ${tabsHtml}
        <span class="cron-viewer-path" id="cron-viewer-path">${esc(job.schedule?.display || job.schedule?.expr || '')}</span>
      </div>
      <div class="cron-viewer-content" id="cron-viewer-content">${esc(job.prompt)}</div>
    </div>`;

  // Store data for tab switching
  detail._cronViewerData = { job, runEntries, outputs };
}

function viewCronSession(sessionId) {
  // Switch to sessions tab and load that session
  $$('.tabs button').forEach(b => b.classList.remove('active'));
  const sessBtn = document.querySelector('[data-tab="sessions"]');
  sessBtn.classList.add('active');
  $$('.tab-panel').forEach(p => p.classList.remove('active'));
  $('#panel-sessions').classList.add('active');
  activeTab = 'sessions';
  location.hash = 'sessions';
  loadSessions().then(() => {
    const items = document.querySelectorAll('.session-item');
    for (const item of items) {
      if (item.textContent.includes(sessionId.substring(0, 12))) {
        item.click();
        break;
      }
    }
  });
}

// Event delegation for cron job list clicks
$('#cron-job-list').addEventListener('click', (e) => {
  const row = e.target.closest('.cron-job-row');
  if (!row) return;
  selectCronJob(row.dataset.jobId);
});

// Event delegation for cron detail pane (viewer tabs, output file clicks, session links)
$('#cron-detail').addEventListener('click', (e) => {
  const tab = e.target.closest('.cron-viewer-tab');
  if (tab) {
    document.querySelectorAll('.cron-viewer-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const which = tab.dataset.cronTab;
    const detail = $('#cron-detail');
    const data = detail._cronViewerData;
    const contentEl = $('#cron-viewer-content');
    const pathEl = $('#cron-viewer-path');
    if (!data || !contentEl) return;

    if (which === 'prompt') {
      contentEl.textContent = data.job.prompt;
      if (pathEl) pathEl.textContent = data.job.schedule?.display || data.job.schedule?.expr || '';
    } else if (which === 'output') {
      // Show output file list
      let html = '';
      for (const f of data.outputs) {
        html += `<div class="cron-run-entry" style="cursor:pointer" data-output-file="${esc(f)}">` +
          `<span style="color:var(--accent)">${esc(f)}</span></div>`;
      }
      contentEl.innerHTML = html || '(no output files)';
      if (pathEl) pathEl.textContent = `${data.outputs.length} file${data.outputs.length !== 1 ? 's' : ''}`;
    } else if (which === 'history') {
      let html = '';
      for (const run of data.runEntries) {
        const dt = new Date(run.ts);
        const statusColor = run.status === 'ok' ? 'var(--green)' : run.status === 'error' ? 'var(--red)' : 'var(--text-dim)';
        const sessionLink = run.sessionId
          ? `<a href="#" class="run-link" data-session-id="${esc(run.sessionId)}" style="color:var(--accent);text-decoration:none">[session]</a>`
          : '';
        html += `<div class="cron-run-entry">` +
          `<span class="run-status" style="color:${statusColor}">${run.status}</span>` +
          `<span class="run-time">${dt.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>` +
          `<span class="run-tokens">${fmtTokens(run.totalTokens)}</span>` +
          `<span class="run-model">${esc(shortModel(run.model))}</span>` +
          sessionLink +
          `</div>`;
      }
      contentEl.innerHTML = html || '(no run history)';
      if (pathEl) pathEl.textContent = `${data.runEntries.length} runs (7d)`;
    }
    return;
  }

  // Output file click
  const outputEntry = e.target.closest('[data-output-file]');
  if (outputEntry && _cronOutputsCache.jobId) {
    const filename = outputEntry.dataset.outputFile;
    const contentEl = $('#cron-viewer-content');
    contentEl.textContent = 'loading...';
    api(`cron/${_cronOutputsCache.jobId}/outputs/${filename}`).then(data => {
      contentEl.textContent = data.content || '(empty)';
    });
    const pathEl = $('#cron-viewer-path');
    if (pathEl) pathEl.textContent = filename;
    return;
  }

  // Session link click
  const sessionLink = e.target.closest('[data-session-id]');
  if (sessionLink) {
    e.preventDefault();
    viewCronSession(sessionLink.dataset.sessionId);
    return;
  }
});

// Calendar block clicks (delegated on persistent wrapper)
$('#cron-cal-table-wrap').addEventListener('click', (e) => {
  const block = e.target.closest('[data-cal-job-id]');
  if (block) {
    selectCronJob(block.dataset.calJobId);
    document.getElementById('panel-cron').scrollTo({ top: 0, behavior: 'smooth' });

});

// Messages (Feed)
// ═══════════════════════════════════════════════════════════════════
let feedInterval = null;
let feedOffset = 0;
const FEED_LIMIT = 100;

$('#feed-source').addEventListener('change', () => { feedOffset = 0; loadFeed(); });

$('#feed-auto-refresh').addEventListener('change', (e) => {
  if (e.target.checked) {
    loadFeed();
    feedInterval = setInterval(loadFeed, 10000);
  } else {
    clearInterval(feedInterval);
    feedInterval = null;
  }
});

async function loadFeed() {
  const source = $('#feed-source').value;
  const params = `?limit=${FEED_LIMIT}&offset=${feedOffset}` + (source ? `&source=${source}` : '');
  const messages = await api('feed' + params);

  const tbody = $('#feed-table tbody');
  if (feedOffset === 0) tbody.innerHTML = '';

  if (!messages.length && feedOffset === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No gateway messages yet</td></tr>';
    $('#feed-load-more').style.display = 'none';
    return;
  }

  const rows = messages.map(m => {
    const dir = m.role === 'user'
      ? '<span style="color:var(--accent)">incoming</span>'
      : '<span style="color:var(--green)">outgoing</span>';
    return `
      <tr>
        <td style="white-space:nowrap">${fmtTime(m.timestamp)}</td>
        <td>${sourceBadge(m.source)}</td>
        <td>${dir}</td>
        <td><span style="font-family:var(--mono);font-size:11px;cursor:pointer;color:var(--accent)" onclick="jumpToSession('${esc(m.session_id)}')">${esc(m.session_id?.slice(0, 18))}</span></td>
        <td>${esc(truncate(m.content, 120))}</td>
      </tr>
    `;
  }).join('');

  if (feedOffset === 0) {
    tbody.innerHTML = rows;
  } else {
    tbody.insertAdjacentHTML('beforeend', rows);
  }

  $('#feed-load-more').style.display = messages.length >= FEED_LIMIT ? '' : 'none';
}

function loadMoreFeed() {
  feedOffset += FEED_LIMIT;
  loadFeed();
}

function jumpToSession(sessionId) {
  // Switch to Sessions tab and select the session
  stopAllIntervals();
  $$('.tabs button').forEach(b => b.classList.remove('active'));
  $$('.tabs button').forEach(b => { if (b.dataset.tab === 'sessions') b.classList.add('active'); });
  $$('.tab-panel').forEach(p => p.classList.remove('active'));
  $('#panel-sessions').classList.add('active');
  activeTab = 'sessions';
  currentSessionId = sessionId;
  loadSessions().then(() => {
    loadSessionDetail(sessionId);
    // Highlight the session in the list
    const items = $$('#sessions-list .session-item');
    items.forEach(el => {
      el.classList.toggle('selected', el.dataset.id === sessionId);
    });
  });
}

$('#search-query').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const q = $('#search-query').value.trim();
  if (!q) return;

  const source = $('#search-source').value;
  const params = `?q=${encodeURIComponent(q)}&limit=30` + (source ? `&source=${source}` : '');
  const results = await api('search' + params);
  const container = $('#search-results');

  if (!results.length) {
    container.innerHTML = '<div class="empty">No results found</div>';
    return;
  }

  container.innerHTML = results.map(r => `
    <div class="card" style="margin-bottom:8px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        ${sourceBadge(r.source)}
        ${roleBadge(r.role)}
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">${esc(truncate(r.session_id, 20))}</span>
        <span style="font-size:11px;color:var(--text-dim)">${fmtTime(r.timestamp)}</span>
      </div>
      <div style="font-size:13px;line-height:1.5">${formatSnippet(r.snippet || '')}</div>
    </div>
  `).join('');
}

function formatSnippet(s) {
  // FTS5 wraps matches in >>> and <<<
  return esc(s).replace(/&gt;&gt;&gt;/g, '<mark style="background:#d29922;color:#000;padding:1px 2px;border-radius:2px">').replace(/&lt;&lt;&lt;/g, '</mark>');
}

// ═══════════════════════════════════════════════════════════════════
// Checkpoints
// ═══════════════════════════════════════════════════════════════════
async function loadCheckpoints() {
  const dirs = await api('checkpoints');
  const container = $('#checkpoints-content');
  if (!dirs.length) {
    container.innerHTML = '<div class="empty">No checkpoints found.<br><span style="font-size:12px;color:var(--text-dim)">Checkpoints are created automatically before file-mutating operations</span></div>';
    return;
  }
  const sections = dirs.map(d => {
    const header = `<div style="margin-bottom:8px">
      <strong>${esc(d.working_dir)}</strong>
      <span style="color:var(--text-dim);font-size:12px;margin-left:8px">${d.count} checkpoint${d.count !== 1 ? 's' : ''}</span>
    </div>`;
    if (!d.snapshots.length) return header + '<div class="empty">No snapshots</div>';
    const rows = d.snapshots.map((s, i) => {
      const changes = s.files_changed
        ? `${s.files_changed} file${s.files_changed !== 1 ? 's' : ''}, <span style="color:#3fb950">+${s.insertions}</span>/<span style="color:#f85149">-${s.deletions}</span>`
        : '—';
      return `<tr>
        <td style="color:var(--text-dim)">${i + 1}</td>
        <td><code>${esc(s.hash)}</code></td>
        <td>${fmtRelTime(s.timestamp)}</td>
        <td>${esc(s.reason)}</td>
        <td>${changes}</td>
      </tr>`;
    }).join('');
    return header + `<div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Hash</th><th>Time</th><th>Reason</th><th>Changes</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }).join('<hr style="border-color:var(--border);margin:16px 0">');
  container.innerHTML = sections;
}

// ═══════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════
// Restore tab from URL hash, or default to overview
(function init() {
  const hash = location.hash.replace('#', '');
  if (hash && tabHandlers[hash]) {
    const btn = document.querySelector(`.tabs button[data-tab="${hash}"]`);
    if (btn) { btn.click(); return; }
  }
  loadOverview();
})();
</script>
</body>
</html>
